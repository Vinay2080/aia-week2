services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-auto-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - API_WORKERS=${API_WORKERS:-1}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-documents}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_SCORE_THRESHOLD=${RAG_SCORE_THRESHOLD:-0.7}
      - RAG_CHUNK_SIZE=${RAG_CHUNK_SIZE:-512}
      - RAG_CHUNK_OVERLAP=${RAG_CHUNK_OVERLAP:-50}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./api:/app/api
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-auto-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-auto-qdrant
    ports:
      - "${QDRANT_EXTERNAL_PORT:-6334}:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - ai-auto-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ai-auto-ollama
    ports:
      - "${OLLAMA_EXTERNAL_PORT:-11435}:11434"
    volumes:
      - /home/verloren/ollama-data:/root/.ollama
    networks:
      - ai-auto-network
    restart: unless-stopped

networks:
  ai-auto-network:
    driver: bridge
